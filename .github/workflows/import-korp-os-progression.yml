name: Import K0rp OS progression pack

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/import-korp-os-progression.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: import-korp-os-progression
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download reviewed source overlay
        env:
          OVERLAY_URL: https://tmpfiles.org/dl/12368017/korp-os-docs-progression-overlay-v0.2.0.zip
          OVERLAY_SHA256: 521911af195d4089b5212841963be92c76d6a7206cc23750b2f0e254e83791c8
        run: |
          set -euo pipefail
          curl --fail --location --retry 4 --retry-delay 2 \
            --output /tmp/korp-overlay.zip "$OVERLAY_URL"
          echo "$OVERLAY_SHA256  /tmp/korp-overlay.zip" | sha256sum --check --strict
          unzip -q -o /tmp/korp-overlay.zip -d "$GITHUB_WORKSPACE"

      - name: Remove one-shot importer
        run: rm -f .github/workflows/import-korp-os-progression.yml

      - name: Guard changed paths
        run: |
          set -euo pipefail
          unexpected="$(git status --short | awk '{print $2}' | grep -Ev '^(docs/k0rp-os/|packages/korp-progression/|package.json$|\.github/workflows/ci\.yml$|\.github/workflows/import-korp-os-progression\.yml$)' || true)"
          if [ -n "$unexpected" ]; then
            echo "Unexpected paths in reviewed overlay:"
            echo "$unexpected"
            exit 1
          fi

      - name: Validate progression package
        run: |
          set -euo pipefail
          npm --prefix packages/korp-progression install --no-package-lock --ignore-scripts
          npm run typecheck:korp-progression
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('packages/korp-progression')
          index = json.loads((root / 'data/progression.database.json').read_text(encoding='utf-8'))
          shard_root = root / 'data/shards'

          for value in index['shards'].values():
              names = value if isinstance(value, list) else [value]
              for name in names:
                  path = shard_root / name
                  if not path.exists():
                      raise SystemExit(f'Missing shard: {path}')
                  json.loads(path.read_text(encoding='utf-8'))

          json.loads((root / 'data/surface-progression.json').read_text(encoding='utf-8'))

          readme = Path('docs/k0rp-os/README.md').read_text(encoding='utf-8')
          missing = [f'{number:02}-' for number in range(20) if f'{number:02}-' not in readme]
          if missing:
              raise SystemExit(f'Document index is missing prefixes: {missing}')

          print('Progression JSON and documentation index validated.')
          PY

      - name: Commit reviewed documentation and data
        run: |
          set -euo pipefail
          git config user.name "K0rp Progression Import"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Add K0rp_OS progression and desktop surface design"
          git push origin HEAD:main
