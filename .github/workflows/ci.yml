name: K0rp CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate project
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install korp-core test dependencies
        working-directory: packages/korp-core
        run: npm install --no-package-lock

      - name: Install korp-modules test dependencies
        working-directory: packages/korp-modules
        run: npm install --no-package-lock

      - name: Install korp-progression typecheck dependencies
        working-directory: packages/korp-progression
        run: npm install --no-package-lock

      - name: Test korp-core
        run: npm run test:korp-core

      - name: Typecheck korp-core
        run: npm run typecheck:korp-core

      - name: Test korp-modules
        run: npm run test:korp-modules

      - name: Typecheck korp-modules
        run: npm run typecheck:korp-modules

      - name: Typecheck korp-progression
        run: npm run typecheck:korp-progression

      - name: Build app
        run: npm run build
